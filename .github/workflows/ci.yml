name: CI Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Ensure Android SDK path
        run: |
          if [ ! -f local.properties ]; then
            if [ -z "${ANDROID_HOME:-}" ]; then
              echo "ANDROID_HOME is not set on runner."
              exit 1
            fi
            echo "sdk.dir=${ANDROID_HOME}" > local.properties
          fi

      - name: Run quality checks
        run: ./gradlew testDebugUnitTest lintDebug

      - name: Get version info
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew assembleRelease

      - name: Upload Debug APK artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-${{ github.run_id }}
          path: |
            app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Organize release artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          mkdir -p output
          VERSION="${{ steps.version.outputs.version }}"
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No release APK found."
            exit 1
          fi
          cp "$APK_PATH" "output/chimera-lite-${VERSION}.apk"
          sha256sum output/*.apk > output/SHA256SUMS.txt
          ls -lh output/

      - name: Upload Release APK artifact
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.ref_name }}
          path: output/*
          if-no-files-found: error
          retention-days: 30

      - name: Create and publish release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release delete "$TAG_NAME" --yes || true
          gh release create "$TAG_NAME" output/* --title "$TAG_NAME" --latest --generate-notes
